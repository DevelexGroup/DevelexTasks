services:
  app:
    build:
      context: .
      dockerfile_inline: |
        FROM nginx:alpine
        COPY build/ /usr/share/nginx/html
        COPY nginx.conf /etc/nginx/conf.d/default.conf
        EXPOSE 80
        CMD ["nginx", "-g", "daemon off;"]
    restart: unless-stopped
    networks:
      - coolify

networks:
  coolify:
    external: true
