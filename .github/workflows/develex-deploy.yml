name: Build and Deploy (Develex Server)

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        type: environment
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || (github.ref == 'refs/heads/develop' && 'development' || 'production') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm i

      - name: Create .env file
        run: |
          cat << EOF > .env
          VITE_API_ENDPOINT=${{ vars.VITE_API_ENDPOINT }}
          VITE_DIAGNOSIS_PASSWORD=${{ secrets.VITE_DIAGNOSIS_PASSWORD }}
          EOF

      - name: Build application
        env:
          BASE_PATH: ${{ vars.BASE_PATH }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: build

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || (github.ref == 'refs/heads/develop' && 'development' || 'production') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: ./build

      - name: Copy build files to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "./build/*"
          target: ${{ vars.DEPLOY_PATH }}

      - name: Copy compose files and nginx config to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,docker-compose.dev.yml,nginx.conf"
          target: ${{ vars.DEPLOY_PATH }}

      - name: Run Docker Compose on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ vars.DEPLOY_PATH }}

            OVERRIDE="${{ vars.COMPOSE_OVERRIDE }}"
            if [ -n "$OVERRIDE" ]; then
              COMPOSE_ARGS="-f docker-compose.yml -f $OVERRIDE"
            else
              COMPOSE_ARGS="-f docker-compose.yml"
            fi

            docker compose $COMPOSE_ARGS down
            docker compose $COMPOSE_ARGS build --no-cache
            docker compose $COMPOSE_ARGS up -d