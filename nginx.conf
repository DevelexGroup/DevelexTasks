server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SvelteKit immutable assets (content-hashed filenames) — cache forever
    location /_app/immutable/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Mutable app metadata (env.js, version.json) — never cache
    location /_app/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Static assets (images, sounds, videos, fonts, favicon) — short cache with revalidation
    location ~* \.(svg|png|jpg|jpeg|gif|webp|ico|mp3|wav|ogg|webm|woff2?|ttf|eot)$ {
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        try_files $uri =404;
    }

    # HTML pages and everything else — never cache
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # Prevent caching of error responses
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        internal;
    }
}

