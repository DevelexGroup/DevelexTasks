server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Cross-origin isolation (required for SharedArrayBuffer)
    add_header Cross-Origin-Opener-Policy  same-origin  always;
    add_header Cross-Origin-Embedder-Policy require-corp always;

    # ── Immutable, hashed assets produced by SvelteKit ──────────────
    # These filenames contain a content hash, so they are safe to cache forever.
    location /_app/immutable/ {
        add_header Cross-Origin-Opener-Policy  same-origin  always;
        add_header Cross-Origin-Embedder-Policy require-corp always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # ── Everything else (HTML, images, sounds, env.js, etc.) ────────
    # These files keep the same name across builds, so they must be
    # revalidated on every request to avoid serving stale content.
    location / {
        add_header Cross-Origin-Opener-Policy  same-origin  always;
        add_header Cross-Origin-Embedder-Policy require-corp always;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}

