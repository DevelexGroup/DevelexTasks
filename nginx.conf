server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Make sure nginx generates ETags from file mtime + size so
    # browsers can do conditional requests (If-None-Match → 304).
    etag on;

    # Cross-origin isolation (required for SharedArrayBuffer)
    add_header Cross-Origin-Opener-Policy  same-origin  always;
    add_header Cross-Origin-Embedder-Policy require-corp always;

    # ── Immutable, hashed assets produced by SvelteKit ──────────────
    # These filenames contain a content hash, so they are safe to cache forever.
    location /_app/immutable/ {
        add_header Cross-Origin-Opener-Policy  same-origin  always;
        add_header Cross-Origin-Embedder-Policy require-corp always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # ── Non-hashed static media (images, sounds, video) ─────────────
    # Same filenames across builds, but content may change on redeploy.
    # Allow the browser to store a local copy (saves bandwidth via 304),
    # but force a revalidation check (ETag / If-None-Match) every time.
    location ~ ^/(images|sound|video)/ {
        add_header Cross-Origin-Opener-Policy  same-origin  always;
        add_header Cross-Origin-Embedder-Policy require-corp always;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # ── Everything else (HTML pages, env.js, version.json, …) ───────
    # HTML drives which hashed bundles and assets get loaded, so it must
    # *never* be served from a stale cache.  no-store prevents the
    # browser from keeping any copy; the other directives are belt-and-
    # suspenders for proxies and older clients.
    location / {
        add_header Cross-Origin-Opener-Policy  same-origin  always;
        add_header Cross-Origin-Embedder-Policy require-corp always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}

